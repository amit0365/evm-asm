name: Build

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: leanprover/lean-action@v1
        with:
          use-mathlib-cache: true
          lake-package-directory: .
          build-args: "--no-build"
      - name: Fetch ProofWidgets and Mathlib cache
        run: |
          lake clean
          lake exe cache get
      - name: Build
        run: lake build
